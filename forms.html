<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML FORMS</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>Personel info</legend>
        <label> username : </label> <br />
        <input type="text" id="name" /> <br />
        <label>password:</label><br />
        <input type="password" /> <br /><br />
        <input type="number" placeholder="number of students" /> <br /><br />
        <input type="email" placeholder="email" /> <br /><br />
        <input type="tel" placeholder="phone" /><br /><br />
        <button>submit</button>
        <input type="button" value="submit" /><br />
        <label>Sum of 1 and 2:</label> <br />
        <input type="radio" name="result" value="3" /> 3 <br />
        <input type="radio" name="result" value="4" /> 4 <br />
        <input type="radio" name="result" value="5" /> 5 <br />
        <label>Your hobbies:</label><br />
        <input type="checkbox" name="hobby" value="singing" /> singing <br />
        <input type="checkbox" name="hobby" value="football" /> football <br />
        <input type="checkbox" name="hobby" value="reading" /> reading <br />

        <label>Choose a car:</label>
        <select name="cars" id="cars">
          <option value="volvo">Volvo</option>
          <option value="saab">Saab</option>
          <option value="mercedes">Mercedes</option>
          <option value="audi">Audi</option>
        </select>
      </fieldset>
    </form>
  </body>
</html>
